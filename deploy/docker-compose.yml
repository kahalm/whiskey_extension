services:
  db:
    image: mariadb:11
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  scraper:
    image: ghcr.io/kahalm/whiskey_extension:latest
    network_mode: host
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      DB_NAME: ${DB_NAME}
    command: ["releases"]

volumes:
  db-data:
